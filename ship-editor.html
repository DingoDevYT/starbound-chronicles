<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Map — Starbound Chronicles</title>
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#050a10;color:#c0d0e0;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;}
:root{--bg:#070c14;--surface:#0d1520;--surface2:#111c2c;--surface3:#162030;--border:#1e2e40;--border2:#2a3e54;--accent:#3a78d4;--text:#c0d0e0;--text-dim:#8098b0;--text-faint:#506070;--gold:#d4af37;}

.editor-wrap{display:grid;grid-template-columns:200px 1fr;height:100vh;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.canvas-wrap{position:relative;overflow:hidden;background:#050a10;}
canvas#main-canvas{display:block;width:100%;height:100%;cursor:crosshair;}

.editor-topbar{position:absolute;top:0;left:0;right:0;height:46px;background:rgba(5,10,16,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;padding:0 14px;z-index:100;}
.etb-brand{font-size:13px;font-weight:700;color:#8ab8ff;text-decoration:none;white-space:nowrap;}
.etb-sep{width:1px;height:22px;background:var(--border);margin:0 2px;}
.etb-name{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.live-pip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-faint);margin-left:auto;transition:opacity .3s;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4acc7a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.sb-section{padding:10px 10px 8px;border-bottom:1px solid var(--border);}
.sb-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:7px;padding:0 3px;display:flex;align-items:center;gap:6px;}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.tool-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:7px 4px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s;text-align:center;user-select:none;}
.tool-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.tool-btn.active{background:rgba(58,120,212,.2);border-color:var(--accent);color:#7aaeff;}
.key-hint{font-size:9px;color:var(--text-faint);display:block;margin-top:1px;}
.tool-btn.active .key-hint{color:rgba(122,174,255,.5);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:3px 3px;margin-bottom:2px;}
.toggle-row label{font-size:11px;color:var(--text-dim);}
.toggle-switch{position:relative;width:30px;height:16px;}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--surface3);border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;}
.toggle-switch input:checked+.toggle-track{background:rgba(58,120,212,.4);border-color:var(--accent);}
.toggle-track::after{content:'';position:absolute;left:1px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--text-faint);transition:all .2s;}
.toggle-switch input:checked+.toggle-track::after{left:calc(100% - 13px);background:#7aaeff;}
.token-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;cursor:default;margin-bottom:2px;}
.token-item:hover{background:var(--surface2);}
.token-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.token-name{font-size:11px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tok-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:12px;padding:2px;line-height:1;border-radius:3px;transition:color .1s;}
.tok-remove:hover{color:#ff8888;}
.sb-add-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;font-family:inherit;padding:0;line-height:1;}
.sb-add-btn:hover{color:#7aaeff;}
.danger-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(160,30,30,.3);color:#ff8888;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;width:100%;transition:all .12s;}
.danger-btn:hover{background:rgba(160,30,30,.15);border-color:rgba(160,30,30,.5);}
.player-banner{padding:56px 12px 16px;font-size:11px;color:var(--text-faint);line-height:1.5;border-bottom:1px solid var(--border);}
.player-banner strong{color:var(--text-dim);display:block;margin-bottom:4px;}

/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:340px;overflow:hidden;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.modal-title{font-size:14px;font-weight:700;color:#e0ecff;}
.modal-close{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;}
.modal-close:hover{color:var(--text);background:var(--surface3);}
.modal-body{padding:14px 16px;}
.modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-group{margin-bottom:11px;}
.form-label{display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:5px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,#1e4a9a,#2a70d4);border:1px solid #3a80e4;color:#e8f0ff;padding:9px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;}
.btn-primary:hover{box-shadow:0 0 14px rgba(58,120,212,.35);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .12s;}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
</style>
</head>
<body>

<div class="editor-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Player banner (non-GM) -->
    <div class="player-banner" id="player-banner" style="display:none;">
      <strong>Player View</strong>
      Click your token on the map to drag it.
    </div>

    <!-- GM Tools -->
    <div class="sb-section" id="sb-tools" style="padding-top:56px;">
      <div class="sb-label">Tools</div>
      <div class="tool-grid">
        <button class="tool-btn" id="t-floor" onclick="setTool('floor')">Floor<span class="key-hint">F</span></button>
        <button class="tool-btn" id="t-wall"  onclick="setTool('wall')">Wall<span class="key-hint">W</span></button>
        <button class="tool-btn" id="t-erase" onclick="setTool('erase')">Erase<span class="key-hint">E</span></button>
        <button class="tool-btn" id="t-move"  onclick="setTool('move')">Move<span class="key-hint">V</span></button>
      </div>
    </div>

    <!-- Grid options -->
    <div class="sb-section">
      <div class="sb-label">View</div>
      <div class="toggle-row">
        <label>Grid lines</label>
        <label class="toggle-switch"><input type="checkbox" id="grid-toggle" checked onchange="render()"><span class="toggle-track"></span></label>
      </div>
    </div>

    <!-- Tokens -->
    <div class="sb-section" style="flex:1;">
      <div class="sb-label">
        Tokens
        <button class="sb-add-btn" id="add-tok-btn" onclick="document.getElementById('modal-add-token').classList.add('open')">+ Add</button>
      </div>
      <div id="token-list-sb"></div>
    </div>

    <!-- Clear (GM) -->
    <div class="sb-section" id="sb-clear" style="border-bottom:none;">
      <button class="danger-btn" onclick="clearAll()">🗑 Clear Map</button>
    </div>

  </aside>

  <!-- Canvas area -->
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="editor-topbar">
      <a class="etb-brand" id="camp-back" href="dashboard.html">✦ Starbound</a>
      <div class="etb-sep"></div>
      <span class="etb-name" id="camp-name">Loading…</span>
      <div class="live-pip" id="live-pip"><div class="live-dot"></div>Live</div>
    </div>
    <canvas id="main-canvas"></canvas>
  </div>

</div>

<!-- Add Token Modal -->
<div class="modal-backdrop" id="modal-add-token">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Token</span>
      <button class="modal-close" onclick="document.getElementById('modal-add-token').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Label</label>
        <input class="form-input" id="tok-label" placeholder="e.g. Goober" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <input type="color" id="tok-color" value="#3a78d4" style="width:100%;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;padding:2px;">
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;margin-bottom:0;">
        <input type="checkbox" id="tok-npc">
        <label for="tok-npc" style="font-size:12px;color:var(--text-dim);cursor:pointer;">NPC / Enemy token</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="document.getElementById('modal-add-token').classList.remove('open')">Cancel</button>
      <button class="btn-primary" onclick="addToken()">Add Token</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js?v=2"></script>
<script>
// ── Constants ────────────────────────────────────────────────
const CELL      = 32;   // pixels per grid cell
const EDGE_SNAP = 7;    // pixels from edge to snap to wall
const TOPBAR    = 46;   // topbar height in px

// ── State ────────────────────────────────────────────────────
let campaignId = null;
let isGM       = false;
let currentUser = null;
let myCharId   = null;

let floorTiles = new Set(); // "x,y"
let walls      = new Set(); // "x,y,r" or "x,y,b"
let tokens     = [];

let activeTool = 'floor';
let panX = 48, panY = 16;
let isDrawing  = false;
let lastCell   = null;
let dragToken  = null;   // {token, curX, curY}
let hoverTgt   = null;
let panState   = null;   // {startX, startY, origPanX, origPanY}

// ── Canvas ───────────────────────────────────────────────────
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');

// ── Init ─────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  campaignId = params.get('id');
  if (!campaignId) { location.href = 'dashboard.html'; return; }

  const session = await Auth.requireAuth();
  if (!session) return;
  currentUser = session.user;

  const { data: camp, error } = await db.from('campaigns').select('*').eq('id', campaignId).single();
  if (error || !camp) { location.href = 'dashboard.html'; return; }

  isGM = camp.owner_id === currentUser.id;
  document.getElementById('camp-name').textContent = camp.name;
  document.getElementById('camp-back').href = `campaign.html?id=${campaignId}`;

  if (!isGM) {
    document.getElementById('sb-tools').style.display   = 'none';
    document.getElementById('sb-clear').style.display   = 'none';
    document.getElementById('add-tok-btn').style.display = 'none';
    document.getElementById('player-banner').style.display = 'block';
    activeTool = 'move';
    const { data: mem } = await db.from('campaign_members')
      .select('character_id').eq('campaign_id', campaignId).eq('user_id', currentUser.id).single();
    myCharId = mem?.character_id ?? null;
  } else {
    setTool('floor');
  }

  await Promise.all([loadFloor(), loadWalls(), loadTokens()]);
  subscribeRealtime();

  resizeCanvas();
  new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas-wrap'));
}

// ── Load data ────────────────────────────────────────────────
async function loadFloor() {
  const { data } = await db.from('ship_grid').select('cell_x,cell_y').eq('campaign_id', campaignId);
  floorTiles.clear();
  (data || []).forEach(r => floorTiles.add(`${r.cell_x},${r.cell_y}`));
  render();
}

async function loadWalls() {
  const { data } = await db.from('ship_walls').select('cell_x,cell_y,dir').eq('campaign_id', campaignId);
  walls.clear();
  (data || []).forEach(r => walls.add(`${r.cell_x},${r.cell_y},${r.dir}`));
  render();
}

async function loadTokens() {
  const { data } = await db.from('ship_tokens').select('*').eq('campaign_id', campaignId);
  tokens = data || [];
  renderTokenList();
  render();
}

// ── Realtime ─────────────────────────────────────────────────
function subscribeRealtime() {
  db.channel(`ship-map-${campaignId}`)
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'ship_grid',   filter:`campaign_id=eq.${campaignId}`},
        p => { floorTiles.add(`${p.new.cell_x},${p.new.cell_y}`); render(); })
    .on('postgres_changes', {event:'DELETE', schema:'public', table:'ship_grid',   filter:`campaign_id=eq.${campaignId}`},
        p => { floorTiles.delete(`${p.old.cell_x},${p.old.cell_y}`); render(); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'ship_walls',  filter:`campaign_id=eq.${campaignId}`},
        p => { walls.add(`${p.new.cell_x},${p.new.cell_y},${p.new.dir}`); render(); })
    .on('postgres_changes', {event:'DELETE', schema:'public', table:'ship_walls',  filter:`campaign_id=eq.${campaignId}`},
        p => { walls.delete(`${p.old.cell_x},${p.old.cell_y},${p.old.dir}`); render(); })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'ship_tokens', filter:`campaign_id=eq.${campaignId}`},
        p => { tokens.push(p.new); renderTokenList(); render(); })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'ship_tokens', filter:`campaign_id=eq.${campaignId}`},
        p => { const i = tokens.findIndex(t => t.id === p.new.id); if (i >= 0) tokens[i] = p.new; renderTokenList(); render(); })
    .on('postgres_changes', {event:'DELETE', schema:'public', table:'ship_tokens', filter:`campaign_id=eq.${campaignId}`},
        p => { tokens = tokens.filter(t => t.id !== p.old.id); renderTokenList(); render(); })
    .subscribe(status => {
      document.getElementById('live-pip').style.opacity = status === 'SUBSCRIBED' ? '1' : '0.4';
    });
}

// ── Canvas resize ────────────────────────────────────────────
function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#050a10';
  ctx.fillRect(0, 0, W, H);

  const ox = panX;
  const oy = panY + TOPBAR;

  // Floor tiles
  ctx.fillStyle = '#0c1828';
  for (const key of floorTiles) {
    const [x, y] = key.split(',').map(Number);
    ctx.fillRect(ox + x*CELL + 0.5, oy + y*CELL + 0.5, CELL - 1, CELL - 1);
  }

  // Grid lines
  if (document.getElementById('grid-toggle')?.checked !== false) {
    ctx.strokeStyle = 'rgba(30,50,70,0.6)';
    ctx.lineWidth = 0.5;
    const x0 = Math.floor(-ox / CELL) - 1;
    const x1 = Math.ceil((W - ox) / CELL) + 1;
    const y0 = Math.floor((-oy + TOPBAR) / CELL) - 1;
    const y1 = Math.ceil((H - oy) / CELL) + 1;
    ctx.beginPath();
    for (let x = x0; x <= x1; x++) { ctx.moveTo(ox + x*CELL, TOPBAR); ctx.lineTo(ox + x*CELL, H); }
    for (let y = y0; y <= y1; y++) { ctx.moveTo(0, oy + y*CELL); ctx.lineTo(W, oy + y*CELL); }
    ctx.stroke();
  }

  // Hover highlight
  if (hoverTgt && isGM && !dragToken) {
    if (hoverTgt.type === 'cell') {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = activeTool === 'erase' ? '#aa3333' : '#3a78d4';
      ctx.fillRect(ox + hoverTgt.x*CELL, oy + hoverTgt.y*CELL, CELL, CELL);
      ctx.globalAlpha = 1;
    } else if (hoverTgt.type === 'wall') {
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#7aaeff';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      drawEdgePath(hoverTgt.x, hoverTgt.y, hoverTgt.dir, ox, oy);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Walls
  ctx.strokeStyle = '#9abcd8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  for (const key of walls) {
    const [xs, ys, dir] = key.split(',');
    ctx.beginPath();
    drawEdgePath(+xs, +ys, dir, ox, oy);
    ctx.stroke();
  }

  // Tokens (skip dragging one)
  for (const tok of tokens) {
    if (dragToken && dragToken.token.id === tok.id) continue;
    drawToken(tok, ox + tok.grid_x*CELL + CELL/2, oy + tok.grid_y*CELL + CELL/2);
  }
  if (dragToken) {
    // Snap preview cell highlight
    const {cellX, cellY} = canvasToGrid(dragToken.curX, dragToken.curY);
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#4acc7a';
    ctx.fillRect(ox + cellX*CELL, oy + cellY*CELL, CELL, CELL);
    ctx.globalAlpha = 1;
    drawToken(dragToken.token, dragToken.curX, dragToken.curY);
  }
}

function drawEdgePath(x, y, dir, ox, oy) {
  if (dir === 'r') {
    ctx.moveTo(ox + (x+1)*CELL, oy + y*CELL);
    ctx.lineTo(ox + (x+1)*CELL, oy + (y+1)*CELL);
  } else {
    ctx.moveTo(ox + x*CELL,     oy + (y+1)*CELL);
    ctx.lineTo(ox + (x+1)*CELL, oy + (y+1)*CELL);
  }
}

function drawToken(tok, cx, cy) {
  const r = CELL * 0.38;
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = tok.color || '#3a78d4';
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(r * 0.9)}px Inter,system-ui,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((tok.label || '?').slice(0, 2).toUpperCase(), cx, cy);
}

// ── Coordinate helpers ───────────────────────────────────────
function mouseToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return { mx: e.clientX - rect.left, my: e.clientY - rect.top };
}

function canvasToGrid(mx, my) {
  const gx    = (mx - panX) / CELL;
  const gy    = (my - panY - TOPBAR) / CELL;
  const cellX = Math.floor(gx);
  const cellY = Math.floor(gy);
  return { gx, gy, cellX, cellY, fracX: gx - cellX, fracY: gy - cellY };
}

// Returns {type:'cell',x,y} or {type:'wall',x,y,dir} based on active tool
function getTarget(mx, my) {
  const { cellX, cellY, fracX, fracY } = canvasToGrid(mx, my);
  const snap = EDGE_SNAP / CELL;

  if (activeTool === 'wall' || activeTool === 'erase') {
    if (fracX < snap && cellX > 0) return { type:'wall', x:cellX-1, y:cellY,   dir:'r' };
    if (fracX > 1-snap)            return { type:'wall', x:cellX,   y:cellY,   dir:'r' };
    if (fracY < snap && cellY > 0) return { type:'wall', x:cellX,   y:cellY-1, dir:'b' };
    if (fracY > 1-snap)            return { type:'wall', x:cellX,   y:cellY,   dir:'b' };
  }

  return { type:'cell', x:cellX, y:cellY };
}

function getTokenAt(mx, my) {
  const r2 = (CELL * 0.42) ** 2;
  for (let i = tokens.length - 1; i >= 0; i--) {
    const tok = tokens[i];
    const cx = panX + tok.grid_x*CELL + CELL/2;
    const cy = panY + TOPBAR + tok.grid_y*CELL + CELL/2;
    if ((mx-cx)**2 + (my-cy)**2 <= r2) return tok;
  }
  return null;
}

// ── Mouse events ─────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const { mx, my } = mouseToCanvas(e);
  if (my < TOPBAR) return;

  // Right/middle click = pan
  if (e.button === 1 || e.button === 2) {
    panState = { startX: e.clientX, startY: e.clientY, origPanX: panX, origPanY: panY };
    canvas.style.cursor = 'grabbing';
    return;
  }
  if (e.button !== 0) return;

  // Token hit check (anyone can move their own; GM can move all)
  const tok = getTokenAt(mx, my);
  const canDrag = tok && (isGM || tok.character_id === myCharId);
  if (canDrag) {
    dragToken = { token: tok, curX: mx, curY: my };
    render();
    return;
  }

  if (!isGM || activeTool === 'move') return;

  isDrawing = true;
  lastCell  = null;
  applyTool(mx, my, true);
});

canvas.addEventListener('mousemove', e => {
  const { mx, my } = mouseToCanvas(e);

  if (panState) {
    panX = panState.origPanX + e.clientX - panState.startX;
    panY = panState.origPanY + e.clientY - panState.startY;
    render();
    return;
  }

  if (dragToken) {
    dragToken.curX = mx;
    dragToken.curY = my;
    render();
    return;
  }

  hoverTgt = (isGM && my >= TOPBAR && activeTool !== 'move') ? getTarget(mx, my) : null;

  if (isDrawing && my >= TOPBAR) applyTool(mx, my, false);
  else render();
});

canvas.addEventListener('mouseup', async e => {
  panState = null;
  canvas.style.cursor = activeTool === 'move' ? 'default' : 'crosshair';
  isDrawing = false;
  lastCell  = null;

  if (dragToken) {
    const { mx, my } = mouseToCanvas(e);
    const { cellX, cellY } = canvasToGrid(mx, my);
    const tok = dragToken.token;
    dragToken = null;
    tok.grid_x = cellX;
    tok.grid_y = cellY;
    render();
    await db.from('ship_tokens').update({ grid_x: cellX, grid_y: cellY }).eq('id', tok.id);
  }
});

canvas.addEventListener('mouseleave', () => {
  hoverTgt  = null;
  isDrawing = false;
  panState  = null;
  render();
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  panX -= e.deltaX;
  panY -= e.deltaY;
  render();
}, { passive: false });

// ── Apply tool ───────────────────────────────────────────────
function applyTool(mx, my, isFirst) {
  const tgt = getTarget(mx, my);

  if (tgt.type === 'cell') {
    const key = `${tgt.x},${tgt.y}`;
    if (!isFirst && lastCell === key) return;
    lastCell = key;

    if (activeTool === 'floor' && !floorTiles.has(key)) {
      floorTiles.add(key);
      db.from('ship_grid').insert({ campaign_id: campaignId, cell_x: tgt.x, cell_y: tgt.y });
    } else if (activeTool === 'erase' && floorTiles.has(key)) {
      floorTiles.delete(key);
      db.from('ship_grid').delete().eq('campaign_id', campaignId).eq('cell_x', tgt.x).eq('cell_y', tgt.y);
    }
  } else if (tgt.type === 'wall' && isFirst) {
    const key = `${tgt.x},${tgt.y},${tgt.dir}`;
    if (walls.has(key)) {
      walls.delete(key);
      db.from('ship_walls').delete().eq('campaign_id', campaignId).eq('cell_x', tgt.x).eq('cell_y', tgt.y).eq('dir', tgt.dir);
    } else {
      walls.add(key);
      db.from('ship_walls').insert({ campaign_id: campaignId, cell_x: tgt.x, cell_y: tgt.y, dir: tgt.dir });
    }
  }

  render();
}

// ── Tool selection ───────────────────────────────────────────
function setTool(t) {
  activeTool = t;
  ['floor','wall','erase','move'].forEach(id => {
    document.getElementById('t-' + id)?.classList.toggle('active', id === t);
  });
  canvas.style.cursor = t === 'move' ? 'default' : 'crosshair';
}

window.addEventListener('keydown', e => {
  if (!isGM || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const map = { f:'floor', w:'wall', e:'erase', v:'move' };
  if (map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
});

// ── Token UI ─────────────────────────────────────────────────
function renderTokenList() {
  const el = document.getElementById('token-list-sb');
  if (!el) return;
  el.innerHTML = tokens.length === 0
    ? `<div style="font-size:11px;color:var(--text-faint);padding:2px 3px;">No tokens yet.</div>`
    : tokens.map(t => `
        <div class="token-item">
          <div class="token-dot" style="background:${t.color||'#3a78d4'}">${(t.label||'?')[0].toUpperCase()}</div>
          <span class="token-name">${t.label}${t.is_npc ? ' <span style="font-size:9px;color:#ff9999;">[NPC]</span>' : ''}</span>
          ${isGM ? `<button class="tok-remove" onclick="removeToken('${t.id}')" title="Remove">✕</button>` : ''}
        </div>`).join('');
}

async function addToken() {
  const label = document.getElementById('tok-label').value.trim() || 'Token';
  const color = document.getElementById('tok-color').value;
  const isNpc = document.getElementById('tok-npc').checked;
  const spawnX = Math.max(0, Math.round((canvas.width  / 2 - panX) / CELL));
  const spawnY = Math.max(0, Math.round((canvas.height / 2 - panY - TOPBAR) / CELL));

  const { data, error } = await db.from('ship_tokens').insert({
    campaign_id: campaignId, label, color, is_npc: isNpc,
    grid_x: spawnX, grid_y: spawnY
  }).select().single();

  if (!error && data) { tokens.push(data); renderTokenList(); render(); }
  document.getElementById('modal-add-token').classList.remove('open');
  document.getElementById('tok-label').value = '';
  document.getElementById('tok-npc').checked = false;
}

async function removeToken(id) {
  if (!confirm('Remove this token from the map?')) return;
  await db.from('ship_tokens').delete().eq('id', id);
  tokens = tokens.filter(t => t.id !== id);
  renderTokenList();
  render();
}

// ── Clear map ────────────────────────────────────────────────
async function clearAll() {
  if (!confirm('Clear all floor tiles and walls? Tokens will stay.')) return;
  await Promise.all([
    db.from('ship_grid').delete().eq('campaign_id', campaignId),
    db.from('ship_walls').delete().eq('campaign_id', campaignId),
  ]);
  floorTiles.clear();
  walls.clear();
  render();
}

// ── Boot ─────────────────────────────────────────────────────
init();
</script>
</body>
</html>
