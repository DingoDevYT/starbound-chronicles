<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Editor — Starbound Chronicles</title>
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#050a10;color:#c0d0e0;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;}
:root{--bg:#070c14;--surface:#0d1520;--surface2:#111c2c;--surface3:#162030;--border:#1e2e40;--border2:#2a3e54;--accent:#3a78d4;--text:#c0d0e0;--text-dim:#8098b0;--text-faint:#506070;--gold:#d4af37;}

.editor-wrap{display:grid;grid-template-columns:210px 1fr;height:100vh;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.canvas-wrap{position:relative;overflow:hidden;background:#050a10;cursor:crosshair;}
canvas#main-canvas{display:block;width:100%;height:100%;}

.editor-topbar{position:absolute;top:0;left:0;right:0;height:46px;background:rgba(5,10,16,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;padding:0 12px;z-index:100;}
.etb-brand{font-size:13px;font-weight:700;color:#8ab8ff;text-decoration:none;white-space:nowrap;}
.etb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;}
.etb-name{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.save-status{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap;}
.save-saving{color:var(--gold);border-color:rgba(212,175,55,.3);}
.save-saved{color:#4acc7a;border-color:rgba(40,160,80,.3);}
.save-dim{color:var(--text-faint);border-color:var(--border);}
.live-pip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-faint);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4acc7a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.etb-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s;white-space:nowrap;}
.etb-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.etb-btn.accent{border-color:var(--accent);color:#7aaeff;background:rgba(58,120,212,.12);}
.etb-btn.accent:hover{background:rgba(58,120,212,.2);}

.sb-section{padding:10px 10px 6px;border-bottom:1px solid var(--border);}
.sb-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:6px;padding:0 4px;}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.tool-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 4px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s;text-align:center;user-select:none;}
.tool-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.tool-btn.active{background:rgba(58,120,212,.2);border-color:var(--accent);color:#7aaeff;}
.tool-btn .key-hint{font-size:9px;color:var(--text-faint);display:block;margin-top:1px;}
.room-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);padding:5px 8px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--text-dim);width:100%;font-family:inherit;transition:all .12s;margin-bottom:3px;}
.room-btn:hover{background:var(--surface3);color:var(--text);}
.room-btn.active{border-color:var(--accent);color:#e0ecff;}
.room-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.grid-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.grid-row label{font-size:11px;color:var(--text-faint);width:24px;flex-shrink:0;}
.mini-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:5px;font-size:11px;width:44px;font-family:inherit;outline:none;}
.mini-input:focus{border-color:var(--accent);}
.apply-btn{background:rgba(58,120,212,.15);border:1px solid rgba(58,120,212,.3);color:#7aaeff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s;}
.apply-btn:hover{background:rgba(58,120,212,.25);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:3px 4px;margin-bottom:3px;}
.toggle-row label{font-size:11px;color:var(--text-dim);}
.toggle-switch{position:relative;width:30px;height:16px;}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--surface3);border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;}
.toggle-switch input:checked+.toggle-track{background:rgba(58,120,212,.4);border-color:var(--accent);}
.toggle-track::after{content:'';position:absolute;left:1px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--text-faint);transition:all .2s;}
.toggle-switch input:checked+.toggle-track::after{left:calc(100% - 13px);background:#7aaeff;}

.token-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background .12s;margin-bottom:2px;}
.token-item:hover{background:var(--surface2);}
.token-item.selected{background:rgba(58,120,212,.15);border:1px solid rgba(58,120,212,.3);}
.token-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.token-name{font-size:11px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.token-npc-badge{font-size:9px;background:rgba(180,40,40,.2);border:1px solid rgba(180,40,40,.3);color:#ff9999;padding:1px 4px;border-radius:3px;}

.token-panel{position:absolute;top:46px;right:0;bottom:0;width:220px;background:var(--surface);border-left:1px solid var(--border);padding:14px;z-index:80;transform:translateX(100%);transition:transform .2s;overflow-y:auto;}
.token-panel.open{transform:translateX(0);}
.tp-name{font-size:15px;font-weight:700;color:#d0e4ff;margin-bottom:10px;}
.tp-hp-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.tp-hp{font-size:22px;font-weight:800;color:#4acc7a;}
.tp-btn{background:var(--surface3);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);padding:4px 8px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s;}
.tp-btn:hover{border-color:var(--border2);color:var(--text);}
.cond-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.cond-badge{background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#d4af37;font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;}
.cond-badge:hover{background:rgba(212,175,55,.25);}

.label-popup{position:absolute;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:8px;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.label-popup input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit;outline:none;width:160px;}
.label-popup input:focus{border-color:var(--accent);}
.label-hint{font-size:10px;color:var(--text-faint);margin-top:4px;}

#minimap{position:absolute;bottom:48px;right:12px;border:1px solid var(--border2);border-radius:6px;background:#050a10;cursor:pointer;z-index:90;opacity:.85;transition:opacity .15s;}
#minimap:hover{opacity:1;}

.zoom-btns{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:90;}
.zoom-btn{background:rgba(13,21,32,.88);border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:16px;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .12s;backdrop-filter:blur(4px);}
.zoom-btn:hover{border-color:var(--border2);color:var(--text);}
.zoom-label{background:rgba(13,21,32,.88);border:1px solid var(--border);color:var(--text-faint);padding:0 8px;border-radius:5px;font-size:11px;display:flex;align-items:center;backdrop-filter:blur(4px);min-width:46px;justify-content:center;}

.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:380px;overflow:hidden;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;color:#e0ecff;}
.modal-close{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;transition:all .12s;}
.modal-close:hover{color:var(--text);background:var(--surface3);}
.modal-body{padding:16px 18px;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:5px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--accent);}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;}
.form-error{color:#ff8888;font-size:12px;margin-top:6px;min-height:18px;}
.btn-primary{background:linear-gradient(135deg,#1e4a9a,#2a70d4);border:1px solid #3a80e4;color:#e8f0ff;padding:10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;}
.btn-primary:hover{box-shadow:0 0 16px rgba(58,120,212,.35);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-dim);padding:9px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .12s;}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-danger{background:rgba(160,30,30,.2);border:1px solid rgba(160,30,30,.4);color:#ff8888;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s;}
.btn-danger:hover{background:rgba(160,30,30,.35);}
</style>
</head>
<body>

<div class="editor-wrap">

  <aside class="sidebar">
    <div class="sb-section" style="padding-top:56px;">
      <div class="sb-label">Tools</div>
      <div class="tool-grid">
        <button class="tool-btn" id="t-floor"      onclick="setTool('floor')"     >Floor<span class="key-hint">F</span></button>
        <button class="tool-btn" id="t-wall"       onclick="setTool('wall')"      >Wall<span class="key-hint">W</span></button>
        <button class="tool-btn" id="t-door"       onclick="setTool('door')"      >Door<span class="key-hint">D</span></button>
        <button class="tool-btn" id="t-erase"      onclick="setTool('erase')"     >Erase<span class="key-hint">E</span></button>
        <button class="tool-btn" id="t-fill"       onclick="setTool('fill')"      >Fill<span class="key-hint">B</span></button>
        <button class="tool-btn" id="t-room"       onclick="setTool('room')"      >Paint<span class="key-hint">R</span></button>
        <button class="tool-btn" id="t-label"      onclick="setTool('label')"     >Label<span class="key-hint">L</span></button>
        <button class="tool-btn" id="t-ruler"      onclick="setTool('ruler')"     >Ruler<span class="key-hint">M</span></button>
        <button class="tool-btn" id="t-fog-reveal" onclick="setTool('fog-reveal')">Reveal<span class="key-hint">V</span></button>
        <button class="tool-btn" id="t-fog-hide"   onclick="setTool('fog-hide')"  >Hide<span class="key-hint">H</span></button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Rooms</div>
      <div id="room-btn-list"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">
        Tokens
        <button onclick="openModal('modal-add-token')" style="font-size:10px;background:none;border:none;color:var(--accent);cursor:pointer;margin-left:4px;font-family:inherit;">+ Add</button>
      </div>
      <div id="token-list-sb"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Grid</div>
      <div class="grid-row">
        <label>W</label><input class="mini-input" id="gw-input" type="number" min="4" max="80" value="24">
        <label>H</label><input class="mini-input" id="gh-input" type="number" min="4" max="60" value="16">
        <button class="apply-btn" onclick="resizeGrid()">Apply</button>
      </div>
      <div class="toggle-row"><label>Grid lines</label><label class="toggle-switch"><input type="checkbox" id="grid-toggle" checked onchange="toggleGrid()"><span class="toggle-track"></span></label></div>
      <div class="toggle-row"><label>Fog of war</label><label class="toggle-switch"><input type="checkbox" id="fog-toggle" onchange="toggleFog()"><span class="toggle-track"></span></label></div>
      <div class="toggle-row" id="gm-row" style="display:none;"><label>👑 GM view</label><label class="toggle-switch"><input type="checkbox" id="gm-toggle" checked onchange="render()"><span class="toggle-track"></span></label></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Load Layout</div>
      <button class="room-btn" onclick="loadLayout('scout')">Scout<small style="color:var(--text-faint);margin-left:auto;">16×10</small></button>
      <button class="room-btn" onclick="loadLayout('frigate')">Frigate<small style="color:var(--text-faint);margin-left:auto;">24×16</small></button>
      <button class="room-btn" onclick="loadLayout('cruiser')">Cruiser<small style="color:var(--text-faint);margin-left:auto;">32×22</small></button>
      <button class="room-btn" onclick="loadLayout('dreadnought')">Dreadnought<small style="color:var(--text-faint);margin-left:auto;">40×28</small></button>
    </div>

    <div class="sb-section" style="border-bottom:none;">
      <button class="room-btn" style="color:#ff8888;" onclick="clearGrid()">🗑 Clear Grid</button>
    </div>
  </aside>

  <div class="canvas-wrap" id="canvas-wrap">
    <div class="editor-topbar">
      <a class="etb-brand" id="camp-back" href="#">✦ Starbound</a>
      <div class="etb-sep"></div>
      <span class="etb-name" id="camp-name">—</span>
      <div class="etb-sep"></div>
      <span class="save-status save-dim" id="save-status">All saved</span>
      <div class="live-pip" id="live-pip" style="display:none;"><div class="live-dot"></div>Live</div>
      <div style="flex:1;"></div>
      <button class="etb-btn" onclick="undo()" title="Ctrl+Z">↩ Undo</button>
      <button class="etb-btn" onclick="redo()" title="Ctrl+Y">↪ Redo</button>
      <div class="etb-sep"></div>
      <button class="etb-btn" onclick="fitToView()">Fit</button>
      <button class="etb-btn accent" onclick="exportPNG()">Export PNG</button>
    </div>

    <canvas id="main-canvas"></canvas>
    <canvas id="minimap" width="180" height="120"></canvas>

    <div class="zoom-btns">
      <button class="zoom-btn" onclick="setZoom(zoom/1.25)">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" onclick="setZoom(zoom*1.25)">+</button>
    </div>

    <div class="token-panel" id="token-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="tp-name" id="tp-name">Token</span>
        <button class="modal-close" onclick="closeTokenPanel()">✕</button>
      </div>
      <div class="tp-hp-row">
        <button class="tp-btn" onclick="adjTokenHP(-1)">−</button>
        <span class="tp-hp" id="tp-hp">—</span>
        <span style="color:var(--text-faint);font-size:13px;" id="tp-hpmax"></span>
        <button class="tp-btn" onclick="adjTokenHP(+1)">+</button>
      </div>
      <div class="cond-list" id="tp-conds"></div>
      <input class="form-input" id="tp-cond-input" placeholder="Add condition (Enter)" style="font-size:11px;padding:5px 8px;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--text-faint);margin-bottom:10px;line-height:1.5;" id="tp-notes"></div>
      <div style="display:flex;gap:6px;">
        <button class="tp-btn" onclick="editTokenModal()">Edit</button>
        <button class="btn-danger" onclick="deleteToken(selectedTokenId)">Delete</button>
      </div>
    </div>

    <div class="label-popup" id="label-popup">
      <input id="label-input" placeholder="Room label…" maxlength="30">
      <div class="label-hint">Enter to save · Esc to cancel · blank to remove</div>
    </div>
  </div>
</div>

<!-- Add Token Modal -->
<div class="modal-backdrop" id="modal-add-token">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Add Token</span><button class="modal-close" onclick="closeModal('modal-add-token')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="tk-name" placeholder="Character or NPC name"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="tk-icon" value="🧑" maxlength="4"></div>
        <div class="form-group"><label class="form-label">Color</label><input type="color" id="tk-color" value="#3a78d4" style="width:100%;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="form-group"><label class="form-label">Max HP</label><input class="form-input" id="tk-hp" type="number" placeholder="Optional"></div>
        <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="tk-npc"><option value="false">Player</option><option value="true">NPC</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="tk-notes" placeholder="Optional…"></div>
      <div class="form-error" id="tk-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-add-token')">Cancel</button>
      <button class="btn-primary" onclick="submitAddToken()" style="width:auto;padding:9px 20px;">Add Token</button>
    </div>
  </div>
</div>

<!-- Edit Token Modal -->
<div class="modal-backdrop" id="modal-edit-token">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Token</span><button class="modal-close" onclick="closeModal('modal-edit-token')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="etk-name"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="form-group"><label class="form-label">Icon</label><input class="form-input" id="etk-icon" maxlength="4"></div>
        <div class="form-group"><label class="form-label">Color</label><input type="color" id="etk-color" style="width:100%;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="form-group"><label class="form-label">HP Current</label><input class="form-input" id="etk-hp-cur" type="number"></div>
        <div class="form-group"><label class="form-label">HP Max</label><input class="form-input" id="etk-hp-max" type="number"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="etk-notes"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-edit-token')">Cancel</button>
      <button class="btn-primary" onclick="saveTokenEdit()" style="width:auto;padding:9px 20px;">Save</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
// ── Constants ──────────────────────────────────────────────────
const VOID=0,FLOOR=1,WALL=2,DOOR=3;
const CELL_SIZE=24;

const ROOM_TYPES=[
  {name:'Bridge',        color:'#1a4a80',icon:'🛸'},
  {name:'Engine Room',   color:'#6a2010',icon:'⚙️'},
  {name:'Crew Quarters', color:'#154a25',icon:'🛏️'},
  {name:'Med Bay',       color:'#0a3040',icon:'💊'},
  {name:'Cargo Hold',    color:'#362e10',icon:'📦'},
  {name:'Armory',        color:'#4a1010',icon:'⚔️'},
  {name:'Mess Hall',     color:'#183408',icon:'🍜'},
  {name:'Airlock',       color:'#141440',icon:'🚪'},
  {name:'Corridor',      color:'#1a2430',icon:'🔗'},
];

const LAYOUT_MAPS={
  scout:[
    '................',
    '..WWWWWWWWWWWW..',
    '..WFFFFFFFFFW..',
    '..WFWWFDWWFW..',
    '..WFFFFFFFFFW..',
    '..WFWWFDWWFW..',
    '..WFFFFFFFFFW..',
    '..WWWWWWWWWWWW..',
    '.................','..................'
  ],
  frigate:[
    '........................',
    '..WWWWWWWWWWWWWWWWWWWW..',

let tokens=[];
let undoStack=[],redoStack=[];
let activeTool='wall',activeRoom=0;
let showGrid=true,fogEnabled=false,isGM=false;
let offsetX=0,offsetY=0,zoom=1;
let isPainting=false,isPanning=false,panStart={x:0,y:0},spaceDown=false;

// ── Grid helpers ───────────────────────────────────────────────
function idx(x,y){return y*gridW+x;}
function inBounds(x,y){return x>=0&&y>=0&&x<gridW&&y<gridH;}

function initGridBlank(w,h){
  gridW=w;gridH=h;
  cells=new Array(w*h).fill(VOID);
  paint=new Array(w*h).fill(0);
  fog=new Array(w*h).fill(2);
  labels=[];
}

function loadLayoutData(layout){
  gridW=layout.width||24;gridH=layout.height||16;
  cells=Array.from(layout.cells||new Array(gridW*gridH).fill(0));
  paint=Array.from(layout.paint||new Array(gridW*gridH).fill(0));
  fog=Array.from(layout.fog||new Array(gridW*gridH).fill(2));
  labels=Array.from(layout.labels||[]);
  fogEnabled=layout.fog_enabled||false;
  document.getElementById('gw-input').value=gridW;
  document.getElementById('gh-input').value=gridH;
  document.getElementById('fog-toggle').checked=fogEnabled;
  fitToView();
}

function getLayoutData(){
  return{width:gridW,height:gridH,cells:Array.from(cells),paint:Array.from(paint),fog:Array.from(fog),labels:labels.map(l=>({...l})),fog_enabled:fogEnabled};
}

// ── Undo / Redo ────────────────────────────────────────────────
function snapshot(){return{cells:[...cells],paint:[...paint],fog:[...fog],labels:labels.map(l=>({...l}))};}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>50)undoStack.shift();redoStack=[];}
function applySnap(s){cells=s.cells;paint=s.paint;fog=s.fog;labels=s.labels;render();scheduleSave();}
function undo(){if(!undoStack.length)return;redoStack.push(snapshot());applySnap(undoStack.pop());}
function redo(){if(!redoStack.length)return;undoStack.push(snapshot());applySnap(redoStack.pop());}

// ── Flood fill ─────────────────────────────────────────────────
function bucketFill(sx,sy){
  const sc=cells[idx(sx,sy)],sp=paint[idx(sx,sy)];
  const nc=activeTool==='erase'?VOID:activeTool==='room'?FLOOR:({floor:FLOOR,wall:WALL,door:DOOR}[activeTool]||FLOOR);
  const np=activeTool==='room'?activeRoom:(activeTool==='erase'?0:sp);
  if(sc===nc&&sp===np)return;
  pushUndo();
  const q=[{x:sx,y:sy}],vis=new Set();
  vis.add(idx(sx,sy));
  while(q.length){
    const{x,y}=q.shift();
    cells[idx(x,y)]=nc;paint[idx(x,y)]=np;
    for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx,ny=y+dy;
      if(!inBounds(nx,ny)||vis.has(idx(nx,ny)))continue;
      if(cells[idx(nx,ny)]!==sc||paint[idx(nx,ny)]!==sp)continue;
      vis.add(idx(nx,ny));q.push({x:nx,y:ny});
    }
  }
  render();scheduleSave();
}

// ── Layouts ────────────────────────────────────────────────────
function loadLayout(name){
  if(!confirm('Load layout? Unsaved changes will be replaced.'))return;
  const map=LAYOUT_MAPS[name];if(!map)return;
  const h=map.length,w=Math.max(...map.map(r=>r.length));
  pushUndo();
  gridW=w;gridH=h;
  cells=new Array(w*h).fill(VOID);
  paint=new Array(w*h).fill(0);
  fog=new Array(w*h).fill(2);
  labels=[];
  for(let y=0;y<h;y++)for(let x=0;x<map[y].length;x++){
    const c=map[y][x];
    cells[idx(x,y)]=c==='F'?FLOOR:c==='W'?WALL:c==='D'?DOOR:VOID;
  }
  document.getElementById('gw-input').value=w;
  document.getElementById('gh-input').value=h;
  fitToView();render();scheduleSave();
}

function clearGrid(){if(!confirm('Clear entire grid?'))return;pushUndo();initGridBlank(gridW,gridH);render();scheduleSave();}

function resizeGrid(){
  const nw=Math.max(4,Math.min(80,parseInt(document.getElementById('gw-input').value)||gridW));
  const nh=Math.max(4,Math.min(60,parseInt(document.getElementById('gh-input').value)||gridH));
  if(nw===gridW&&nh===gridH)return;
  pushUndo();
  const nc=new Array(nw*nh).fill(VOID),np=new Array(nw*nh).fill(0),nf=new Array(nw*nh).fill(2);
  for(let y=0;y<Math.min(gridH,nh);y++)for(let x=0;x<Math.min(gridW,nw);x++){
    nc[y*nw+x]=cells[idx(x,y)]||VOID;np[y*nw+x]=paint[idx(x,y)]||0;nf[y*nw+x]=fog[idx(x,y)]??2;
  }
  gridW=nw;gridH=nh;cells=nc;paint=np;fog=nf;render();scheduleSave();
}

// ── Rooms & Tools ──────────────────────────────────────────────

// ── Canvas ─────────────────────────────────────────────────────
const canvas=document.getElementById('main-canvas');
const ctx=canvas.getContext('2d');
const minimap=document.getElementById('minimap');
const mmCtx=minimap.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

function setupCanvas(){
  const ro=new ResizeObserver(resizeCanvas);
  ro.observe(wrap);
  resizeCanvas();
}

function resizeCanvas(){
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  render();
}

function fitToView(){
  const pad=80;
  zoom=Math.min((canvas.width-pad)/(gridW*CELL_SIZE),(canvas.height-pad)/(gridH*CELL_SIZE),4);
  offsetX=(canvas.width-gridW*CELL_SIZE*zoom)/2;
  offsetY=(canvas.height-gridH*CELL_SIZE*zoom)/2+23;
  updateZoomLabel();render();
}

function setZoom(z){
  const cx=canvas.width/2,cy=canvas.height/2;
  const prev=zoom;zoom=Math.max(.15,Math.min(6,z));
  offsetX=cx-(cx-offsetX)*(zoom/prev);
  offsetY=cy-(cy-offsetY)*(zoom/prev);
  updateZoomLabel();render();
}

function updateZoomLabel(){document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';}

function canvasToCell(cx,cy){return{x:Math.floor((cx-offsetX)/(CELL_SIZE*zoom)),y:Math.floor((cy-offsetY)/(CELL_SIZE*zoom))};}
function cellToCanvas(gx,gy){return{x:offsetX+gx*CELL_SIZE*zoom,y:offsetY+gy*CELL_SIZE*zoom};}

// ── Render ─────────────────────────────────────────────────────
let animFrame=0;
function animLoop(){animFrame++;if(cells.some(c=>c===DOOR))render();requestAnimationFrame(animLoop);}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#050a10';ctx.fillRect(0,0,canvas.width,canvas.height);

  const cs=CELL_SIZE*zoom;
  const gmView=isGM&&document.getElementById('gm-toggle')?.checked;
  const sx=Math.max(0,Math.floor(-offsetX/cs));
  const ex=Math.min(gridW,Math.ceil((canvas.width-offsetX)/cs)+1);
  const sy=Math.max(0,Math.floor((-offsetY-46)/cs));
  const ey=Math.min(gridH,Math.ceil((canvas.height-offsetY)/cs)+1);

  // Base cells
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    const i=idx(x,y),t=cells[i],p=paint[i]||0;
    if(!t)continue;
    const fs=fogEnabled?(fog[i]??2):2;
    if(!gmView&&fogEnabled&&fs===0)continue;
    drawCell(x,y,t,p,fs,cs);
  }

  // Fog overlay
  if(fogEnabled){
    for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
      const i=idx(x,y),fs=fog[i]??2;
      const px=offsetX+x*cs,py=offsetY+y*cs;
      if(gmView){
        if(fs===0){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(px,py,cs,cs);}
        else if(fs===1){ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(px,py,cs,cs);}
      }else{
        if(fs===0){ctx.fillStyle='#050a10';ctx.fillRect(px,py,cs,cs);}
        else if(fs===1){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(px,py,cs,cs);}
      }
    }
  }

  // Grid lines
  if(showGrid&&zoom>=.4){
    ctx.strokeStyle='rgba(40,60,80,.35)';ctx.lineWidth=.5;
    for(let x=sx;x<=ex;x++){ctx.beginPath();ctx.moveTo(offsetX+x*cs,offsetY+sy*cs);ctx.lineTo(offsetX+x*cs,offsetY+ey*cs);ctx.stroke();}
    for(let y=sy;y<=ey;y++){ctx.beginPath();ctx.moveTo(offsetX+sx*cs,offsetY+y*cs);ctx.lineTo(offsetX+ex*cs,offsetY+y*cs);ctx.stroke();}
  }

  // Labels
  if(zoom>=.55){
    ctx.font=`bold ${Math.max(8,Math.min(13,cs*.38))}px Inter,system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    labels.forEach(lbl=>{
      if(!inBounds(lbl.x,lbl.y))return;
      const px=offsetX+(lbl.x+.5)*cs,py=offsetY+(lbl.y+.5)*cs;
      const tw=ctx.measureText(lbl.text).width;
      ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(px-tw/2-4,py-9,tw+8,18);
      ctx.fillStyle=lbl.color||'#d0e8ff';ctx.fillText(lbl.text,px,py);
    });
  }

  // Tokens
  renderTokensOnCanvas(cs,gmView);

  // Ruler
  if(rulerStart&&rulerEnd){
    const a=cellToCanvas(rulerStart.x+.5,rulerStart.y+.5),b=cellToCanvas(rulerEnd.x+.5,rulerEnd.y+.5);
    ctx.save();ctx.strokeStyle='#ffd040';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.setLineDash([]);
    const dist=Math.round(Math.sqrt((rulerEnd.x-rulerStart.x)**2+(rulerEnd.y-rulerStart.y)**2)*10)/10;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    ctx.font='bold 11px Inter,system-ui';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(mx-26,my-21,52,17);
    ctx.fillStyle='#ffd040';ctx.fillText(dist+' cells',mx,my-5);
    ctx.restore();
  }

  // Hover
  if(hoverCx>=0&&hoverCy>=0&&inBounds(hoverCx,hoverCy)){
    ctx.strokeStyle='rgba(80,160,220,.6)';ctx.lineWidth=1.5;
    ctx.strokeRect(offsetX+hoverCx*cs+1,offsetY+hoverCy*cs+1,cs-2,cs-2);
  }

  // Drag token preview
  if(isDraggingToken&&dragCell&&inBounds(dragCell.x,dragCell.y)){
    const tk=tokens.find(t=>t.id===draggingTokenId);
    if(tk){ctx.strokeStyle=tk.color||'#3a78d4';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(offsetX+dragCell.x*cs,offsetY+dragCell.y*cs,cs,cs);ctx.setLineDash([]);}
  }

  drawMinimap();
}

function drawCell(x,y,type,paintIdx,fogState,cs){
  const px=offsetX+x*cs,py=offsetY+y*cs,dim=fogState<2;
  if(type===FLOOR){
    ctx.fillStyle=dim?darkenHex(paintIdx?ROOM_TYPES[paintIdx-1].color:'#1a2232',.5):(paintIdx?ROOM_TYPES[paintIdx-1].color:'#1a2232');
    ctx.fillRect(px,py,cs,cs);
  }else if(type===WALL){
    ctx.fillStyle='#181e28';ctx.fillRect(px,py,cs,cs);
    ctx.fillStyle=dim?'#1e2a36':'#3a4a58';ctx.fillRect(px,py,cs,2);ctx.fillRect(px,py,2,cs);
    ctx.fillStyle=dim?'#222a38':'#2e3848';ctx.fillRect(px+2,py+2,cs-3,cs-3);
  }else if(type===DOOR){
    const t=Date.now()/1200;
    ctx.fillStyle='#0a1828';ctx.fillRect(px,py,cs,cs);
    ctx.fillStyle=dim?'#1a4060':'#3090b0';ctx.fillRect(px,py,cs,3);ctx.fillRect(px,py+cs-3,cs,3);
    ctx.fillStyle='#000810';ctx.fillRect(px+cs*.1,py+3,cs*.8,cs-6);
    const gW=cs*.1,sw=Math.sin(t)*.4+.6;
    ctx.fillStyle=dim?'#1a5070':'#40a8c8';
    ctx.fillRect(px+cs*(.5-sw/2),py+3,gW,cs-6);
    ctx.fillRect(px+cs*(.5+sw/2)-gW,py+3,gW,cs-6);
  }
}

function darkenHex(hex,amount){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.round(r*amount)},${Math.round(g*amount)},${Math.round(b*amount)})`;
}

function renderTokensOnCanvas(cs,gmView){
  tokens.forEach(tk=>{
    if(!inBounds(tk.grid_x,tk.grid_y))return;
    if(isDraggingToken&&tk.id===draggingTokenId)return;
    const fs=fogEnabled?(fog[idx(tk.grid_x,tk.grid_y)]??2):2;
    if(!gmView&&fogEnabled&&fs===0)return;
    const px=offsetX+(tk.grid_x+.5)*cs,py=offsetY+(tk.grid_y+.5)*cs,r=cs*.42;
    ctx.save();
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=tk.color||'#3a78d4';ctx.fill();
    if(tk.id===selectedTokenId){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();}
    ctx.font=`${Math.max(7,r*.85)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText(tk.icon||'🧑',px,py);
    if(zoom>=.8&&tk.hp_max){
      const pct=Math.max(0,(tk.hp_current||0)/tk.hp_max);
      const bw=cs*.8,bh=4,bx=px-bw/2,by=py+r+2;
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=pct>.5?'#4acc7a':pct>.25?'#d4af37':'#cc4444';
      ctx.fillRect(bx,by,bw*pct,bh);
    }
    if(zoom>=.9&&tk.label){
      ctx.font=`bold ${Math.max(7,r*.5)}px Inter,system-ui`;ctx.textAlign='center';ctx.textBaseline='top';
      const tw=ctx.measureText(tk.label).width;
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(px-tw/2-3,py+r+7,tw+6,13);
      ctx.fillStyle='#e0ecff';ctx.fillText(tk.label,px,py+r+8);
    }
    ctx.restore();
  });
}

function drawMinimap(){
  const mw=minimap.width,mh=minimap.height;
  mmCtx.clearRect(0,0,mw,mh);
  mmCtx.fillStyle='#050a10';mmCtx.fillRect(0,0,mw,mh);
  const ms=Math.min(mw/gridW,mh/gridH);
  for(let y=0;y<gridH;y++)for(let x=0;x<gridW;x++){
    const t=cells[idx(x,y)],p=paint[idx(x,y)]||0;
    if(!t)continue;
    mmCtx.fillStyle=t===FLOOR?(p?ROOM_TYPES[p-1].color:'#1e2838'):t===WALL?'#3a4050':'#2080a0';
    mmCtx.fillRect(x*ms,y*ms,Math.max(1,ms-.3),Math.max(1,ms-.3));
  }
  tokens.forEach(tk=>{
    mmCtx.fillStyle=tk.color||'#3a78d4';
    mmCtx.beginPath();mmCtx.arc((tk.grid_x+.5)*ms,(tk.grid_y+.5)*ms,ms*.45,0,Math.PI*2);mmCtx.fill();
  });
  const vx=-offsetX/(CELL_SIZE*zoom)*ms,vy=-offsetY/(CELL_SIZE*zoom)*ms;
  const vw=canvas.width/(CELL_SIZE*zoom)*ms,vh=canvas.height/(CELL_SIZE*zoom)*ms;
  mmCtx.strokeStyle='rgba(58,120,212,.8)';mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(vx,vy,vw,vh);
}

// ── Mouse ──────────────────────────────────────────────────────
canvas.addEventListener('contextmenu',e=>e.preventDefault());

canvas.addEventListener('mousedown',e=>{
  const{x:cx,y:cy}=canvasToCell(e.clientX,e.clientY);
  if(e.button===1||(e.button===0&&spaceDown)){
    isPanning=true;panStart={x:e.clientX-offsetX,y:e.clientY-offsetY};canvas.style.cursor='grabbing';return;
  }
  if(e.button===2){
    if(!inBounds(cx,cy))return;
    if(activeTool==='fog-reveal'||activeTool==='fog-hide'){pushUndo();isPainting=true;applyFog(cx,cy,0);return;}
    pushUndo();isPainting=true;applyCell(cx,cy,VOID,0);lastPaintedCell=idx(cx,cy);return;
  }
  if(e.button===0){
    if(activeTool!=='ruler'&&activeTool!=='label'&&!spaceDown){
      const tk=tokens.find(t=>t.grid_x===cx&&t.grid_y===cy);
      if(tk){isDraggingToken=true;draggingTokenId=tk.id;dragCell={x:cx,y:cy};canvas.style.cursor='grabbing';return;}
    }
    if(!inBounds(cx,cy))return;
    if(activeTool==='ruler'){
      if(!rulerStart){rulerStart={x:cx,y:cy};rulerEnd={x:cx,y:cy};}
      else{rulerStart={x:cx,y:cy};rulerEnd=null;}
      render();return;
    }
    if(activeTool==='label'){openLabelPopup(cx,cy,e.clientX,e.clientY);return;}
    if(activeTool==='fill'){bucketFill(cx,cy);return;}
    if(activeTool==='fog-reveal'||activeTool==='fog-hide'){
      pushUndo();isPainting=true;applyFog(cx,cy,activeTool==='fog-reveal'?2:0);lastPaintedCell=idx(cx,cy);return;
    }
    pushUndo();isPainting=true;applyCell(cx,cy);lastPaintedCell=idx(cx,cy);
  }
});

canvas.addEventListener('mousemove',e=>{
  const{x:cx,y:cy}=canvasToCell(e.clientX,e.clientY);
  if(isPanning){offsetX=e.clientX-panStart.x;offsetY=e.clientY-panStart.y;render();return;}
  if(isDraggingToken&&inBounds(cx,cy)){dragCell={x:cx,y:cy};render();return;}
  hoverCx=cx;hoverCy=cy;
  if(activeTool==='ruler'&&rulerStart){rulerEnd={x:cx,y:cy};render();return;}
  if(isPainting&&inBounds(cx,cy)){
    const i=idx(cx,cy);
    if(i!==lastPaintedCell){
      if(activeTool==='fog-reveal')applyFog(cx,cy,2);
      else if(activeTool==='fog-hide')applyFog(cx,cy,0);
      else applyCell(cx,cy);
      lastPaintedCell=i;
    }
  }else render();
});

canvas.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;canvas.style.cursor=spaceDown?'grab':'crosshair';}
  if(isDraggingToken&&dragCell){
    isDraggingToken=false;
    const tk=tokens.find(t=>t.id===draggingTokenId);
    if(tk&&inBounds(dragCell.x,dragCell.y)){
      tk.grid_x=dragCell.x;tk.grid_y=dragCell.y;
      db.from('ship_tokens').update({grid_x:tk.grid_x,grid_y:tk.grid_y}).eq('id',tk.id);
    }
    draggingTokenId=null;dragCell=null;renderTokenSidebar();render();return;
  }
  if(isPainting){isPainting=false;scheduleSave();}
  canvas.style.cursor=spaceDown?'grab':'crosshair';
});

canvas.addEventListener('mouseleave',()=>{hoverCx=-1;hoverCy=-1;isPainting=false;render();});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.9,mx=e.clientX,my=e.clientY;
  const prev=zoom,nz=Math.max(.15,Math.min(6,zoom*f));
  offsetX=mx-(mx-offsetX)*(nz/prev);offsetY=my-(my-offsetY)*(nz/prev);
  zoom=nz;updateZoomLabel();render();
},{passive:false});

// Touch
let lastT=[];
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){const t=e.touches[0],{x:cx,y:cy}=canvasToCell(t.clientX,t.clientY);if(inBounds(cx,cy)){pushUndo();isPainting=true;applyCell(cx,cy);}}
  lastT=Array.from(e.touches);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    isPainting=false;
    const[a,b]=e.touches,[oa,ob]=lastT;
    if(oa&&ob){
      const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),pd=Math.hypot(oa.clientX-ob.clientX,oa.clientY-ob.clientY);
      const cx=(a.clientX+b.clientX)/2,cy=(a.clientY+b.clientY)/2,f=d/pd,nz=Math.max(.15,Math.min(6,zoom*f));
      offsetX=cx-(cx-offsetX)*(nz/zoom);offsetY=cy-(cy-offsetY)*(nz/zoom);zoom=nz;updateZoomLabel();
    }
    lastT=Array.from(e.touches);render();
  }else if(e.touches.length===1&&isPainting){
    const t=e.touches[0],{x:cx,y:cy}=canvasToCell(t.clientX,t.clientY);
    if(inBounds(cx,cy))applyCell(cx,cy);lastT=Array.from(e.touches);
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{isPainting=false;scheduleSave();});

function applyCell(x,y,forceType,forcePaint){
  if(!inBounds(x,y))return;
  const i=idx(x,y);
  let nt=VOID,np=0;
  if(forceType!==undefined){nt=forceType;np=forcePaint||0;}
  else switch(activeTool){
    case'floor':nt=FLOOR;np=paint[i]||0;break;
    case'wall':nt=WALL;np=0;break;
    case'door':nt=DOOR;np=0;break;
    case'erase':nt=VOID;np=0;break;
    case'room':if(cells[i]===FLOOR){nt=FLOOR;np=activeRoom;}else return;break;
    default:return;
  }
  if(cells[i]===nt&&paint[i]===np)return;
  cells[i]=nt;paint[i]=np;
  if(fogEnabled&&nt!==VOID&&(fog[i]??2)===0)fog[i]=2;
  render();
}

function applyFog(x,y,state){if(!inBounds(x,y))return;fog[idx(x,y)]=state;render();}

// ── Labels ─────────────────────────────────────────────────────
function openLabelPopup(cx,cy,mx,my){
  const existing=labels.find(l=>l.x===cx&&l.y===cy);
  const popup=document.getElementById('label-popup'),inp=document.getElementById('label-input');
  popup.style.display='block';
  const rect=wrap.getBoundingClientRect();
  popup.style.left=Math.min(mx-rect.left,wrap.clientWidth-200)+'px';
  popup.style.top=Math.max(50,(my-rect.top-60))+'px';
  inp.value=existing?.text||'';
  labelEditCell={x:cx,y:cy};
  inp.focus();inp.select();
}

document.getElementById('label-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();commitLabel();}
  if(e.key==='Escape')closeLabelPopup();
});
document.addEventListener('click',e=>{if(!e.target.closest('#label-popup')&&document.getElementById('label-popup').style.display==='block')commitLabel();});

function commitLabel(){
  if(!labelEditCell)return;
  const txt=document.getElementById('label-input').value.trim();
  const{x,y}=labelEditCell;
  labels=labels.filter(l=>!(l.x===x&&l.y===y));
  if(txt)labels.push({x,y,text:txt,color:'#d0e8ff'});
  closeLabelPopup();scheduleSave();render();
}
function closeLabelPopup(){document.getElementById('label-popup').style.display='none';labelEditCell=null;}

// ── Keyboard ───────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key===' '){e.preventDefault();spaceDown=true;canvas.style.cursor='grab';}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
  if(!e.ctrlKey){
    const k=e.key.toLowerCase();
    const map={f:'floor',w:'wall',d:'door',e:'erase',b:'fill',r:'room',l:'label',m:'ruler',v:'fog-reveal',h:'fog-hide'};
    if(map[k])setTool(map[k]);
    if(k==='-')setZoom(zoom/1.2);
    if(k==='='||k==='+')setZoom(zoom*1.2);
  }
});
document.addEventListener('keyup',e=>{if(e.key===' '){spaceDown=false;canvas.style.cursor='crosshair';}});

// ── Minimap click ──────────────────────────────────────────────
minimap.addEventListener('click',e=>{
  const rect=minimap.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const ms=Math.min(minimap.width/gridW,minimap.height/gridH);
  offsetX=canvas.width/2-(mx/ms)*CELL_SIZE*zoom;
  offsetY=canvas.height/2-(my/ms)*CELL_SIZE*zoom;
  render();
});

// ── Tokens ─────────────────────────────────────────────────────
async function loadTokens(){
  const{data}=await db.from('ship_tokens').select('*').eq('campaign_id',campaignId);
  tokens=data||[];renderTokenSidebar();render();
}

function renderTokenSidebar(){
  const list=document.getElementById('token-list-sb');
  if(!tokens.length){list.innerHTML='<div style="font-size:11px;color:var(--text-faint);padding:4px 8px;">No tokens yet.</div>';return;}
  list.innerHTML=tokens.map(tk=>`
    <div class="token-item${tk.id===selectedTokenId?' selected':''}" onclick="selectToken('${tk.id}')">
      <div class="token-dot" style="background:${tk.color||'#3a78d4'}">${tk.icon||'🧑'}</div>
      <span class="token-name">${esc(tk.label)}</span>
      ${tk.is_npc?'<span class="token-npc-badge">NPC</span>':''}
    </div>`).join('');
}

async function submitAddToken(){
  const name=document.getElementById('tk-name').value.trim();
  document.getElementById('tk-error').textContent='';
  if(!name)return document.getElementById('tk-error').textContent='Enter a name.';
  const hp=parseInt(document.getElementById('tk-hp').value)||null;
  const{data,error}=await db.from('ship_tokens').insert({
    campaign_id:campaignId,label:name,
    icon:document.getElementById('tk-icon').value||'🧑',
    color:document.getElementById('tk-color').value,
    hp_max:hp,hp_current:hp,
    is_npc:document.getElementById('tk-npc').value==='true',
    notes:document.getElementById('tk-notes').value.trim(),
    grid_x:Math.floor(gridW/2),grid_y:Math.floor(gridH/2),
  }).select().single();
  if(error)return document.getElementById('tk-error').textContent=error.message;
  tokens.push(data);renderTokenSidebar();render();
  closeModal('modal-add-token');
  document.getElementById('tk-name').value='';
}

function selectToken(id){
  selectedTokenId=id;
  const tk=tokens.find(t=>t.id===id);if(!tk)return;
  const panel=document.getElementById('token-panel');panel.classList.add('open');
  document.getElementById('tp-name').textContent=tk.label;
  document.getElementById('tp-hp').textContent=tk.hp_current??'—';
  document.getElementById('tp-hpmax').textContent=tk.hp_max?'/'+tk.hp_max:'';
  document.getElementById('tp-notes').textContent=tk.notes||'';
  const conds=document.getElementById('tp-conds');
  conds.innerHTML=(tk.conditions||[]).map(c=>`<span class="cond-badge" onclick="removeCond('${tk.id}','${esc(c)}')">${esc(c)} ×</span>`).join('');
  renderTokenSidebar();render();
}

function closeTokenPanel(){selectedTokenId=null;document.getElementById('token-panel').classList.remove('open');renderTokenSidebar();render();}

async function adjTokenHP(delta){
  const tk=tokens.find(t=>t.id===selectedTokenId);if(!tk)return;
  tk.hp_current=(tk.hp_current||0)+delta;
  await db.from('ship_tokens').update({hp_current:tk.hp_current}).eq('id',tk.id);
  selectToken(selectedTokenId);render();
}

document.getElementById('tp-cond-input').addEventListener('keydown',async e=>{
  if(e.key!=='Enter')return;
  const cond=e.target.value.trim();if(!cond)return;
  const tk=tokens.find(t=>t.id===selectedTokenId);if(!tk)return;
  const conds=[...(tk.conditions||[]),cond];
  await db.from('ship_tokens').update({conditions:conds}).eq('id',tk.id);
  tk.conditions=conds;e.target.value='';selectToken(selectedTokenId);
});

async function removeCond(id,cond){
  const tk=tokens.find(t=>t.id===id);if(!tk)return;
  tk.conditions=(tk.conditions||[]).filter(c=>c!==cond);
  await db.from('ship_tokens').update({conditions:tk.conditions}).eq('id',tk.id);
  selectToken(id);
}

function editTokenModal(){
  const tk=tokens.find(t=>t.id===selectedTokenId);if(!tk)return;
  document.getElementById('etk-name').value=tk.label;
  document.getElementById('etk-icon').value=tk.icon||'🧑';
  document.getElementById('etk-color').value=tk.color||'#3a78d4';
  document.getElementById('etk-hp-cur').value=tk.hp_current||'';
  document.getElementById('etk-hp-max').value=tk.hp_max||'';
  document.getElementById('etk-notes').value=tk.notes||'';
  openModal('modal-edit-token');
}

async function saveTokenEdit(){
  const tk=tokens.find(t=>t.id===selectedTokenId);if(!tk)return;
  const u={label:document.getElementById('etk-name').value.trim(),icon:document.getElementById('etk-icon').value,color:document.getElementById('etk-color').value,hp_current:parseInt(document.getElementById('etk-hp-cur').value)||null,hp_max:parseInt(document.getElementById('etk-hp-max').value)||null,notes:document.getElementById('etk-notes').value.trim()};
  await db.from('ship_tokens').update(u).eq('id',tk.id);
  Object.assign(tk,u);closeModal('modal-edit-token');selectToken(tk.id);render();
}

async function deleteToken(id){
  if(!id||!confirm('Remove token?'))return;
  await db.from('ship_tokens').delete().eq('id',id);
  tokens=tokens.filter(t=>t.id!==id);closeTokenPanel();renderTokenSidebar();render();
}

// ── Export PNG ─────────────────────────────────────────────────
function exportPNG(){
  const scale=2;
  const tmp=document.createElement('canvas');
  tmp.width=gridW*CELL_SIZE*scale;tmp.height=gridH*CELL_SIZE*scale;
  const tc=tmp.getContext('2d');
  tc.fillStyle='#050a10';tc.fillRect(0,0,tmp.width,tmp.height);
  for(let y=0;y<gridH;y++)for(let x=0;x<gridW;x++){
    const i=idx(x,y),t=cells[i],p=paint[i]||0;
    if(!t)continue;
    const px=x*CELL_SIZE*scale,py=y*CELL_SIZE*scale,cs=CELL_SIZE*scale;
    if(t===FLOOR){tc.fillStyle=p?ROOM_TYPES[p-1].color:'#1a2232';tc.fillRect(px,py,cs,cs);}
    else if(t===WALL){tc.fillStyle='#181e28';tc.fillRect(px,py,cs,cs);tc.fillStyle='#3a4a58';tc.fillRect(px,py,cs,2);tc.fillRect(px,py,2,cs);tc.fillStyle='#2e3848';tc.fillRect(px+2,py+2,cs-3,cs-3);}
    else if(t===DOOR){tc.fillStyle='#0a1828';tc.fillRect(px,py,cs,cs);tc.fillStyle='#3090b0';tc.fillRect(px,py,cs,3);tc.fillRect(px,py+cs-3,cs,3);}
  }
  if(zoom>=.55){
    tc.font=`bold ${Math.round(CELL_SIZE*scale*.35)}px Inter,system-ui`;tc.textAlign='center';tc.textBaseline='middle';
    labels.forEach(lbl=>{
      if(!inBounds(lbl.x,lbl.y))return;
      const px=(lbl.x+.5)*CELL_SIZE*scale,py=(lbl.y+.5)*CELL_SIZE*scale;
      const tw=tc.measureText(lbl.text).width;
      tc.fillStyle='rgba(0,0,0,.6)';tc.fillRect(px-tw/2-6,py-11,tw+12,22);
      tc.fillStyle=lbl.color||'#d0e8ff';tc.fillText(lbl.text,px,py);
    });
  }
  const a=document.createElement('a');
  a.download=(campaignData?.ship_name||'ship').replace(/\s+/g,'_')+'.png';
  a.href=tmp.toDataURL('image/png');a.click();
}

// ── Save / Realtime ────────────────────────────────────────────
function scheduleSave(){
  clearTimeout(saveTimer);setSaveStatus('saving');
  saveTimer=setTimeout(doSave,800);
}

async function doSave(){
  const{error}=await db.from('campaigns').update({ship_layout:getLayoutData()}).eq('id',campaignId);
  setSaveStatus(error?'error':'saved');
  if(!error)setTimeout(()=>setSaveStatus('dim'),2000);
}

function setSaveStatus(state){
  const el=document.getElementById('save-status');el.className='save-status';
  if(state==='saving'){el.classList.add('save-saving');el.textContent='Saving…';}
  else if(state==='saved'){el.classList.add('save-saved');el.textContent='Saved ✓';}
  else if(state==='error'){el.style.color='#ff8888';el.textContent='Save failed';}
  else{el.classList.add('save-dim');el.textContent='All saved';}
}

function subscribeRealtime(){
  db.channel('ship-'+campaignId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'campaigns',filter:`id=eq.${campaignId}`},p=>{
      if(p.new.ship_layout){
        const r=p.new.ship_layout;
        cells=Array.from(r.cells||[]);paint=Array.from(r.paint||[]);fog=Array.from(r.fog||[]);
        if(r.labels)labels=r.labels;render();
      }
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'ship_tokens',filter:`campaign_id=eq.${campaignId}`},()=>loadTokens())
    .subscribe(s=>{document.getElementById('live-pip').style.display=s==='SUBSCRIBED'?'flex':'none';});
}

// ── Helpers ────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-backdrop').forEach(b=>b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');}));
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

setTool('wall');
</script>
