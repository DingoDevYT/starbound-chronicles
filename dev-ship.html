<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ship 3D Harness — Starbound Chronicles</title>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="js/combat3d-structures.js"></script>
<script src="js/ship3d.js"></script>
<style>
  body { margin:0; background:#03040a; font-family:system-ui,sans-serif; overflow:hidden; }
  #bar { position:fixed; top:10px; left:10px; z-index:5; display:flex; gap:6px; flex-wrap:wrap; max-width:74vw; }
  #bar button { padding:6px 12px; border-radius:6px; border:1px solid #35507a; background:#101a2c; color:#cfe0ff; cursor:pointer; font-size:12px; }
  #bar button.on { background:#1c3a66; border-color:#4dc0ff; color:#fff; }
  #stat { position:fixed; bottom:10px; left:10px; color:#8fa8cc; font-size:12px; z-index:5; }
</style>
</head>
<body>
<div id="bar"></div>
<div id="stat">loading…</div>
<script>
let renderer, scene, camera, controls, env, curSize = 'medium', curTier = 1, world = null, lightGroup = null;
function init() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 2500);
  controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
  scene.add(new THREE.HemisphereLight(0xbcd6ff, 0x181c26, 0.85));
  const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(30, 50, 20); scene.add(key);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.5); fill.position.set(-30, 12, -18); scene.add(fill);
  env = createShipEnvironment(scene);
  addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
  let last = performance.now();
  (function tick() { requestAnimationFrame(tick); const now = performance.now(); const dt = Math.min(0.05, (now - last) / 1000); last = now; controls.update(); env.update(dt); renderer.render(scene, camera); })();
}
function show(size, tier) {
  curSize = size; curTier = tier ?? curTier;
  document.querySelectorAll('#bar button[data-size]').forEach(b => b.classList.toggle('on', b.dataset.size === size));
  document.querySelectorAll('#bar button[data-tier]').forEach(b => b.classList.toggle('on', +b.dataset.tier === curTier));
  if (world) scene.remove(world);
  if (lightGroup) scene.remove(lightGroup);
  const built = buildShip3D(size, { wingTier: curTier, thrusterTier: curTier, reactorTier: curTier, gunCount: 1 + curTier, gunTier: curTier });
  world = built.group; scene.add(world);
  lightGroup = new THREE.Group(); addShipLighting(lightGroup, built); scene.add(lightGroup);
  env.bindShip(built, world);
  const o = built.outline;
  camera.position.set(o.cx - o.maxHalf * 2.4, o.maxHalf * 1.5, o.zStern + o.maxHalf * 1.8);
  controls.target.set(o.cx, 0.4, o.zMid); controls.update();
  document.getElementById('stat').textContent = `${size} · tier ${curTier} · ${built.picks.length} deck tiles · mode ${env.mode}`;
  window.__built = built; window.__ready = true;
}
function setMode(m) { env.setMode(m); document.querySelectorAll('#bar button[data-mode]').forEach(b => b.classList.toggle('on', b.dataset.mode === m)); }
const bar = document.getElementById('bar');
['small','medium','large','capital'].forEach(s => { const b = document.createElement('button'); b.textContent = s; b.dataset.size = s; b.onclick = () => show(s); bar.appendChild(b); });
[1,2,3].forEach(t => { const b = document.createElement('button'); b.textContent = 'tier ' + t; b.dataset.tier = t; b.onclick = () => show(curSize, t); bar.appendChild(b); });
['travel','dock','planet'].forEach(m => { const b = document.createElement('button'); b.textContent = m; b.dataset.mode = m; b.onclick = () => setMode(m); bar.appendChild(b); });
init(); show('medium', 1); setMode('travel');
</script>
</body>
</html>
